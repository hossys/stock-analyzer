name: Daily Stock Analysis

on:
  schedule:
    - cron: "0 5 * * *"   # 05:00 UTC = 07:00 Berlin time (CET/CEST)
  workflow_dispatch:        # allows manual run from GitHub website

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write       # needed to commit picks.json back to repo
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements-actions.txt

      - name: Run analyzer
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          STOCKERAM_API_URL: ${{ secrets.STOCKERAM_API_URL }}
          STOCKERAM_ADMIN_TOKEN: ${{ secrets.STOCKERAM_ADMIN_TOKEN }}
        run: python main.py --once

      - name: Publish picks.json
        run: |
          git config user.name "Stockeram Bot"
          git config user.email "action@github.com"
          git add picks.json
          git diff --cached --quiet || git commit -m "Update predictions $(date -u +%Y-%m-%d)"
          git push
